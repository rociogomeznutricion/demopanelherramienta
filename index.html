<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área de Clientes - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --navy: #0a192f;
            --blue-accent: #0047ab;
            --soft-bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--soft-bg);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--white);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            text-align: center;
        }

        .login-card h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .login-card p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--navy);
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background-color: #fcfcfd;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--blue-accent);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(0, 71, 171, 0.1);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--blue-accent) 0%, var(--navy) 100%);
            color: var(--white);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 71, 171, 0.2);
        }

        .btn-login:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--danger);
            font-size: 13px;
            font-weight: 500;
            margin-top: 20px;
            padding: 10px;
            background-color: #fef2f2;
            border-radius: 8px;
            border: 1px solid #fee2e2;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Área de Clientes</h2>
    <p>Introduce tus credenciales para acceder a tu plan</p>
    
    <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
            <input type="text" id="username" placeholder="Ej: JVERDU" autocomplete="off">
        </div>
    </div>
    
    <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
            <input type="password" id="password" placeholder="••••••">
        </div>
    </div>
    
    <button id="btn-submit" class="btn-login" onclick="ejecutarLogin()">
        <span id="btn-text">Iniciar Sesión</span>
        <div id="btn-spinner" class="spinner"></div>
    </button>

    <div id="error-box" class="error-message">
        <i class="fa-solid fa-circle-xmark"></i>
        <span id="error-txt">Usuario o contraseña incorrectos.</span>
    </div>
</div>

<script>
    // URL de tu Control Central de Pacientes proporcionada
    const MASTER_CONTROL_URL = 'https://docs.google.com/spreadsheets/d/1L7lbZ4JkE7dqO_oizMEDKQabtyUBbR4yaqcrt3LMa6Q/gviz/tq?gid=0&tqx=out:json';

    // Función segura para extraer el ID de cualquier formato de URL de Google Sheets sin expresiones regulares conflictivas
    function limpiarYExtraerId(urlText) {
        if (!urlText || typeof urlText !== 'string') return null;
        let p = urlText.indexOf('/d/');
        if (p === -1) return null;
        let recortado = urlText.substring(p + 3);
        let fin = recortado.indexOf('/');
        if (fin === -1) fin = recortado.indexOf('?');
        if (fin === -1) return recortado.trim();
        return recortado.substring(0, fin).trim();
    }

    function mostrarError(mensaje) {
        const errorBox = document.getElementById('error-box');
        const errorTxt = document.getElementById('error-txt');
        errorTxt.innerText = mensaje;
        errorBox.style.display = 'flex';
    }

    function ocultarError() {
        document.getElementById('error-box').style.display = 'none';
    }

    function setCargando(estado) {
        const btn = document.getElementById('btn-submit');
        const text = document.getElementById('btn-text');
        const spinner = document.getElementById('btn-spinner');
        
        btn.disabled = estado;
        if (estado) {
            text.innerText = "Verificando...";
            spinner.style.display = "block";
        } else {
            text.innerText = "Iniciar Sesión";
            spinner.style.display = "none";
        }
    }

    function ejecutarLogin() {
        ocultarError();
        
        const userInput = document.getElementById('username').value.trim();
        const passInput = document.getElementById('password').value.trim();

        if (!userInput || !passInput) {
            mostrarError("Por favor, rellena todos los campos.");
            return;
        }

        setCargando(true);

        // Consultamos la hoja central de control de pacientes
        fetch(MASTER_CONTROL_URL)
            .then(response => {
                if (!response.ok) throw new Error("No se pudo conectar con la base de datos.");
                return response.text();
            })
            .then(rawData => {
                // Limpieza del JSON retornado por Google API
                const inicio = rawData.indexOf('{');
                const fin = rawData.lastIndexOf('}');
                const jsonClean = JSON.parse(rawData.substring(inicio, fin + 1));
                const filas = jsonClean.table.rows;

                let usuarioEncontrado = null;

                // Recorremos las filas (empezando en 1 para saltar las cabeceras)
                for (let i = 1; i < filas.length; i++) {
                    const celda = filas[i].c;
                    if (!celda) continue;

                    // Columna B (índice 1): Usuario | Columna C (índice 2): Contraseña
                    const dbUser = celda[1] && celda[1].v ? String(celda[1].v).trim() : '';
                    const dbPass = celda[2] && celda[2].v ? String(celda[2].v).trim() : '';
                    const dbActivo = celda[3] && celda[3].v ? String(celda[3].v).trim().toUpperCase() : 'N';

                    if (dbUser.toLowerCase() === userInput.toLowerCase() && dbPass === passInput) {
                        if (dbActivo !== 'S') {
                            throw new Error("Tu cuenta se encuentra inactiva. Contacta con tu nutricionista.");
                        }
                        usuarioEncontrado = celda;
                        break;
                    }
                }

                if (!usuarioEncontrado) {
                    throw new Error("Usuario o contraseña incorrectos.");
                }

                // Columna E (índice 4): URL_Sheets_Paciente
                const urlFicheroPaciente = usuarioEncontrado[4] && usuarioEncontrado[4].v ? String(usuarioEncontrado[4].v).trim() : '';
                const idDocumentoPaciente = limpiarYExtraerId(urlFicheroPaciente);

                if (!idDocumentoPaciente) {
                    throw new Error("Error de configuración: El enlace de tu plan no es válido o está vacío.");
                }

                // Guardamos el ID del paciente en almacenamiento local para que lo lea el index.html del Dashboard
                localStorage.setItem('PACIENTE_SPREADSHEET_ID', idDocumentoPaciente);
                
                // Redirección al Dashboard interno
                window.location.href = 'index.html';
            })
            .catch(error => {
                console.error(error);
                mostrarError(error.message || "Error al iniciar sesión. Inténtalo de nuevo.");
                setCargando(false);
            });
    }
</script>

</body>
</html>
