<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Nutricional - Reparto e Ingestas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --navy: #0a192f;
            --blue-accent: #0047ab;
            --soft-bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --p-color: #ef4444;
            --hc-color: #f59e0b;
            --g-color: #10b981;
            --m-color: #8b5cf6; /* Color violeta premium para alimentos mixtos */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--soft-bg);
            color: var(--text-dark);
            padding: 20px;
            line-height: 1.4;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* Header Estilo Consultoría */
        .header {
            background-color: var(--navy);
            color: var(--white);
            padding: 35px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .header p {
            font-weight: 300;
            opacity: 0.8;
            font-size: 14px;
        }

        /* Sección de Ingestas */
        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            margin-top: 30px;
            margin-bottom: 20px;
            color: var(--navy);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .meal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .meal-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .meal-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .meal-name {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--blue-accent);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meal-content {
            font-size: 13px;
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Estilos de la Tabla y Filtros */
        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .filter-btn {
            background-color: #f1f5f9;
            color: var(--text-dark);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background-color: #e2e8f0;
        }

        .filter-btn.active[data-type="all"] { background-color: var(--navy); color: var(--white); border-color: var(--navy); }
        .filter-btn.active[data-type="proteína"] { background-color: var(--p-color); color: var(--white); border-color: var(--p-color); }
        .filter-btn.active[data-type="hidratos"] { background-color: var(--hc-color); color: var(--white); border-color: var(--hc-color); }
        .filter-btn.active[data-type="grasas"] { background-color: var(--g-color); color: var(--white); border-color: var(--g-color); }
        .filter-btn.active[data-type="mixto"] { background-color: var(--m-color); color: var(--white); border-color: var(--m-color); }

        .search-area { margin-bottom: 20px; }

        .search-input {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background-color: #fcfcfd;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            border-radius: 10px;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background-color: #f1f5f9;
            padding: 14px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-light);
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 14px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            color: var(--white);
            text-transform: uppercase;
        }
        .bg-p { background-color: var(--p-color); }
        .bg-hc { background-color: var(--hc-color); }
        .bg-g { background-color: var(--g-color); }
        .bg-m { background-color: var(--m-color); }
        .bg-default { background-color: var(--text-light); }

        /* Tarjetas de Observaciones */
        .obs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .obs-card {
            background: #fffdf5;
            border: 1px solid #fef3c7;
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 4px 6px -1px rgba(217, 119, 6, 0.05);
        }

        .obs-card.g2 {
            background: #f0fdf4;
            border-color: #bbf7d0;
            box-shadow: 0 4px 6px -1px rgba(22, 163, 74, 0.05);
        }

        .obs-title {
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #b45309;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .obs-card.g2 .obs-title {
            color: #15803d;
        }

        .obs-content {
            font-size: 13.5px;
            color: #451a03;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .obs-card.g2 .obs-content {
            color: #14532d;
        }

        .status-pill {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #dcfce7;
            color: #15803d;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .meal-grid { grid-template-columns: 1fr; }
            .obs-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>Plan Nutricional de Bloques</h1>
        <p>Dashboard personalizado para el seguimiento de ingestas y equivalencias</p>
    </header>

    <div class="section-title">
        Reparto de Bloques por Ingesta
        <span id="sync-status" class="status-pill">Sincronizando...</span>
    </div>

    <div class="meal-grid" id="meal-grid">
        </div>

    <div class="section-title">Base de Datos de Equivalencias</div>
    <section class="card">
        <div class="filter-container">
            <button class="filter-btn active" data-type="all" onclick="setCategoryFilter('all', this)">⚡ Todos</button>
            <button class="filter-btn" data-type="proteína" onclick="setCategoryFilter('proteína', this)">🥩 Proteínas</button>
            <button class="filter-btn" data-type="hidratos" onclick="setCategoryFilter('hidratos', this)">🌾 Hidratos</button>
            <button class="filter-btn" data-type="grasas" onclick="setCategoryFilter('grasas', this)">🥑 Grasas</button>
            <button class="filter-btn" data-type="mixto" onclick="setCategoryFilter('mixto', this)">🥣 Mixtos</button>
        </div>

        <div class="search-area">
            <input type="text" id="search" class="search-input" placeholder="🔎 Escribe cualquier parte del alimento para buscar..." onkeyup="ejecutarFiltroCombinado()">
        </div>
        <div class="table-container">
            <table id="equiv-table">
                <thead>
                    <tr>
                        <th>Alimento</th>
                        <th style="width: 200px;">Tipo</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </section>

    <div class="section-title">📌 Observaciones y Pautas de Uso</div>
    <div class="obs-grid" id="obs-grid">
        </div>
</div>

<script>
    // Configuración de IDs de Google Sheets
    const SPREADSHEET_ID = '1agPyD1JW34QSqXOeisPSsjXQuIXkwvdP4ZFyRAlvip4';
    const GID_AJUSTES = '1147936171'; // Pestaña MASTER
    const GID_EQUIV = '1979658163';   // Pestaña Equivalencias Mercadona

    const urlAjustes = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?gid=${GID_AJUSTES}&tqx=out:json`;
    const urlEquiv = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?gid=${GID_EQUIV}&tqx=out:json`;

    const mealIcons = {
        "DESAYUNO": "fa-coffee",
        "ALMUERZO": "fa-apple-whole",
        "COMIDA": "fa-utensils",
        "MERIENDA": "fa-cookie",
        "CENA": "fa-moon"
    };

    let currentCategoryFilter = 'all';

    Promise.all([
        fetch(urlAjustes).then(r => r.text()),
        fetch(urlEquiv).then(r => r.text())
    ]).then(([dataAjustes, dataEquiv]) => {
        renderMeals(dataAjustes);
        renderTableAndObservations(dataEquiv);
        document.getElementById('sync-status').innerText = "Sincronizado";
    }).catch(err => {
        document.getElementById('sync-status').innerText = "Error de conexión";
        document.getElementById('sync-status').style.background = "#fee2e2";
        document.getElementById('sync-status').style.color = "#b91c1c";
    });

    function renderMeals(raw) {
        const json = cleanJSON(raw);
        const rows = json.table.rows;
        const grid = document.getElementById('meal-grid');
        let html = "";

        for (let i = 0; i < 5; i++) {
            if (!rows[i] || !rows[i].c) continue;
            
            const row = rows[i].c;
            const mealName = row[0] && row[0].v ? row[0].v : `Ingesta ${i+1}`; 
            const blocksRaw = row[2] && row[2].v ? String(row[2].v) : 'No asignado'; 
            
            const blocksStyled = blocksRaw.replace(/\n/g, '<br>');
            const icon = mealIcons[mealName.toUpperCase()] || "fa-utensils";

            html += `
                <div class="meal-card">
                    <div class="meal-name">
                        <i class="fa-solid ${icon}"></i> ${mealName}
                    </div>
                    <div class="meal-content">
                        ${blocksStyled}
                    </div>
                </div>
            `;
        }
        grid.innerHTML = html;
    }

    function renderTableAndObservations(raw) {
        const json = cleanJSON(raw);
        const rows = json.table.rows;
        
        // --- PARTE 1: PROCESAR ENCABEZADOS ---
        let typesHeader = [];
        if(rows[0] && rows[0].c) {
            for(let col = 0; col < 5; col++) {
                if(rows[0].c[col] && rows[0].c[col].v) {
                    let cleanType = String(rows[0].c[col].v).replace(/\s*\(.*?\)\s*/g, '').trim();
                    typesHeader[col] = cleanType;
                } else {
                    typesHeader[col] = "General";
                }
            }
        }

        // --- PARTE 2: PROCESAR TABLA DE ALIMENTOS ---
        const tbody = document.getElementById('table-body');
        let htmlTable = "";

        for (let i = 1; i < rows.length; i++) {
            const rowC = rows[i].c;
            if (!rowC) continue;

            for(let col = 0; col < 5; col++) {
                if(rowC[col] && rowC[col].v !== null && String(rowC[col].v).trim() !== "") {
                    const foodName = rowC[col].v;
                    const typeLabel = typesHeader[col] || "Proteína";
                    
                    let badgeClass = "bg-default";
                    if(typeLabel.toLowerCase().includes("prot")) badgeClass = "bg-p";
                    else if(typeLabel.toLowerCase().includes("hidr") || typeLabel.toLowerCase().includes("carb")) badgeClass = "bg-hc";
                    else if(typeLabel.toLowerCase().includes("gras")) badgeClass = "bg-g";
                    else if(typeLabel.toLowerCase().includes("mixt")) badgeClass = "bg-m"; // Color morado asignado dinámicamente

                    htmlTable += `<tr data-type="${typeLabel.toLowerCase()}">
                        <td><strong>${foodName}</strong></td>
                        <td><span class="badge ${badgeClass}">${typeLabel}</span></td>
                    </tr>`;
                }
            }
        }
        tbody.innerHTML = htmlTable || '<tr><td colspan="2">No se encontraron alimentos.</td></tr>';

        // --- PARTE 3: EXTRAER OBSERVACIONES FIJAS ---
        const obsGrid = document.getElementById('obs-grid');
        let obsColF = [];
        let obsColG = [];

        for (let i = 0; i < rows.length; i++) {
            if(rows[i] && rows[i].c) {
                if(rows[i].c[5] && rows[i].c[5].v !== null && String(rows[i].c[5].v).trim() !== "") {
                    obsColF.push(String(rows[i].c[5].v));
                }
                if(rows[i].c[6] && rows[i].c[6].v !== null && String(rows[i].c[6].v).trim() !== "") {
                    obsColG.push(String(rows[i].c[6].v));
                }
            }
        }

        let titleF = "Observaciones Generales", contentF = "No hay pautas registradas.";
        if(obsColF.length > 0) {
            titleF = obsColF[0];
            contentF = obsColF.slice(1).join("\n");
        }

        let titleG = "Salsas y Condimentos", contentG = "No hay pautas registradas.";
        if(obsColG.length > 0) {
            titleG = obsColG[0];
            contentG = obsColG.slice(1).join("\n");
        }

        if(obsColF.length > 0 && obsColF[0].length > 30) { titleF = "Pautas Adicionales"; contentF = obsColF.join("\n"); }
        if(obsColG.length > 0 && obsColG[0].length > 30) { titleG = "Uso de Salsas y Extras"; contentG = obsColG.join("\n"); }

        contentF = contentF.replace(/\n/g, '<br>');
        contentG = contentG.replace(/\n/g, '<br>');

        obsGrid.innerHTML = `
            <div class="obs-card">
                <div class="obs-title"><i class="fa-solid fa-circle-info"></i> ${titleF}</div>
                <div class="obs-content">${contentF}</div>
            </div>
            <div class="obs-card g2">
                <div class="obs-title"><i class="fa-solid fa-bowl-food"></i> ${titleG}</div>
                <div class="obs-content">${contentG}</div>
            </div>
        `;
    }

    function cleanJSON(raw) {
        return JSON.parse(raw.substring(raw.indexOf('{'), raw.lastIndexOf('}') + 1));
    }

    function setCategoryFilter(category, buttonElement) {
        currentCategoryFilter = category;
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        buttonElement.classList.add('active');
        ejecutarFiltroCombinado();
    }

    function ejecutarFiltroCombinado() {
        const textInput = document.getElementById('search').value.toLowerCase();
        const trs = document.getElementById('table-body').getElementsByTagName('tr');

        for (let i = 0; i < trs.length; i++) {
            const tr = trs[i];
            const foodNameText = tr.getElementsByTagName('td')[0].textContent.toLowerCase();
            const trTypeAttr = tr.getAttribute('data-type') || "";

            const matchesText = foodNameText.includes(textInput);
            
            let matchesCategory = false;
            if (currentCategoryFilter === 'all') {
                matchesCategory = true;
            } else {
                matchesCategory = trTypeAttr.includes(currentCategoryFilter);
            }

            if (matchesText && matchesCategory) {
                tr.style.display = "";
            } else {
                tr.style.display = "none";
            }
        }
    }
</script>

</body>
</html>
