<script>
    // URL de tu control central de clientes
    const MASTER_CONTROL_URL = 'https://docs.google.com/spreadsheets/d/1L7lbZ4JkE7dqO_oizMEDKQabtyUBbR4yaqcrt3LMa6Q/gviz/tq?gid=0&tqx=out:json';

    const GID_AJUSTES = '1147936171'; // Pestaña del perfil del paciente con bloques y exclusiones
    const GID_EQUIV = '1979658163';   // Pestaña o ID de la base de datos de alimentos
    
    const mealIcons = { "DESAYUNO": "fa-coffee", "ALMUERZO": "fa-apple-whole", "COMIDA": "fa-utensils", "MERIENDA": "fa-cookie", "CENA": "fa-moon" };
    
    let bloquesAsignadosPorIngesta = {}; 
    let poolProteinas = []; let poolCarbohidratos = []; let poolGrasas = []; let poolBuscadorCompleto = [];
    let currentCategoryFilter = 'all';

    let exclusionesPaciente = {
        estiloVida: "",
        tagsExcluir: [],
        alimentosOdiados: []
    };

    function cleanJSON(raw) { return JSON.parse(raw.substring(raw.indexOf('{'), raw.lastIndexOf('}') + 1)); }

    function limpiarYExtraerId(urlText) {
        if (!urlText || typeof urlText !== 'string') return null;
        let p = urlText.indexOf('/d/');
        if (p === -1) return null;
        let recortado = urlText.substring(p + 3);
        let fin = recortado.indexOf('/');
        if (fin === -1) fin = recortado.indexOf('?');
        if (fin === -1) return recortado.trim();
        return recortado.substring(0, fin).trim();
    }

    document.getElementById('username').addEventListener('keydown', function(e) { if (e.key === 'Enter') ejecutarLogin(); });
    document.getElementById('password').addEventListener('keydown', function(e) { if (e.key === 'Enter') ejecutarLogin(); });

    function ejecutarLogin() {
        const userIn = document.getElementById('username').value.trim();
        const passIn = document.getElementById('password').value.trim();
        const errBox = document.getElementById('error-box');
        const errTxt = document.getElementById('error-text');

        if (!userIn || !passIn) {
            errTxt.innerText = "Completa todos los campos.";
            errBox.style.display = "flex";
            return;
        }

        errTxt.innerText = "Validando...";
        errBox.style.display = "flex";

        fetch(MASTER_CONTROL_URL)
            .then(r => r.text())
            .then(rawData => {
                const json = cleanJSON(rawData);
                const filas = json.table.rows;
                let cuenta = null;
                let nombrePacienteOriginal = "Paciente";

                for (let i = 1; i < filas.length; i++) {
                    const c = filas[i].c;
                    if (!c) continue;
                    const dbUser = c[1] && c[1].v ? String(c[1].v).trim() : '';
                    const dbPass = c[2] && c[2].v ? String(c[2].v).trim() : '';
                    const dbActivo = c[3] && c[3].v ? String(c[3].v).trim().toUpperCase() : 'N';

                    if (dbUser.toLowerCase() === userIn.toLowerCase() && dbPass === passIn) {
                        if (dbActivo !== 'S') {
                            errTxt.innerText = "Suscripción inactiva. Consulte con su nutricionista.";
                            return;
                        }
                        cuenta = c;
                        nombrePacienteOriginal = c[0] && c[0].v ? String(c[0].v).trim() : 'Paciente';
                        break;
                    }
                }

                if (!cuenta) {
                    errTxt.innerText = "Usuario o contraseña incorrectos.";
                    return;
                }

                const urlPaciente = cuenta[4] && cuenta[4].v ? String(cuenta[4].v).trim() : '';
                const idPaciente = limpiarYExtraerId(urlPaciente);

                if (!idPaciente) {
                    errTxt.innerText = "La URL del paciente en la columna E no es válida.";
                    return;
                }

                document.getElementById('main-title').innerText = `Plan de Nutrición: ${nombrePacienteOriginal}`;
                document.getElementById('personalized-welcome').innerText = `Dashboard exclusivo para ${nombrePacienteOriginal}`;

                errBox.style.display = "none";
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('dashboard-screen').style.display = "block";
                
                cargarDatosNutricionales(idPaciente);
            })
            .catch(err => {
                console.error(err);
                errTxt.innerText = "Error al conectar con la base de datos.";
            });
    }

    function cerrarSesion() {
        document.getElementById('dashboard-screen').style.display = "none";
        document.getElementById('login-screen').style.display = "flex";
        document.getElementById('username').value = "";
        document.getElementById('password').value = "";
        document.getElementById('plate-output').style.display = "none";
    }

    function cargarDatosNutricionales(spreadsheetId) {
        document.getElementById('sync-status').innerText = "Sincronizando...";
        document.getElementById('sync-status').style.background = "#fef3c7";

        const urlAjustes = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?gid=${GID_AJUSTES}&tqx=out:json`;
        const urlEquiv = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?gid=${GID_EQUIV}&tqx=out:json`;

        Promise.all([
            fetch(urlAjustes).then(r => r.text()),
            fetch(urlEquiv).then(r => r.text())
        ]).then(([dataAjustes, dataEquiv]) => {
            procesarPerfilYBloquesPaciente(dataAjustes);
            procesarYRenderizarEquivalencias(dataEquiv);
            
            document.getElementById('sync-status').innerText = "Sincronizado";
            document.getElementById('sync-status').style.background = "#dcfce7";
            document.getElementById('sync-status').style.color = "#15803d";
        }).catch(err => {
            console.error(err);
            document.getElementById('sync-status').innerText = "Error en sincronización";
            document.getElementById('sync-status').style.background = "#ffeeec";
        });
    }

    function procesarPerfilYBloquesPaciente(raw) {
        const json = cleanJSON(raw);
        const rows = json.table.rows;

        exclusionesPaciente.estiloVida = "";
        exclusionesPaciente.tagsExcluir = [];
        exclusionesPaciente.alimentosOdiados = [];

        // 1. Lectura de exclusiones del perfil (Celdas E1, E2, E3 de tu captura -> Índices 0, 1, 2 en JS)
        if (rows[0] && rows[0].c && rows[0].c[4] && rows[0].c[4].v) {
            exclusionesPaciente.estiloVida = String(rows[0].c[4].v).trim().toUpperCase();
        }
        if (rows[1] && rows[1].c && rows[1].c[4] && rows[1].c[4].v) {
            exclusionesPaciente.tagsExcluir = String(rows[1].c[4].v).split(',').map(t => t.trim().toUpperCase()).filter(t => t !== "");
        }
        if (rows[2] && rows[2].c && rows[2].c[4] && rows[2].c[4].v) {
            exclusionesPaciente.alimentosOdiados = String(rows[2].c[4].v).split(',').map(a => a.trim().toLowerCase()).filter(a => a !== "");
        }

        // 2. Lectura matemática de Bloques Totales (Filas 12, 13, 14 -> Índices 11, 12, 13 en JS, Columna B -> Índice 1)
        let totalP = (rows[11] && rows[11].c && rows[11].c[1]) ? parseFloat(rows[11].c[1].v) : 0;
        let totalG = (rows[12] && rows[12].c && rows[12].c[1]) ? parseFloat(rows[12].c[1].v) : 0;
        let totalHC = (rows[13] && rows[13].c && rows[13].c[1]) ? parseFloat(rows[13].c[1].v) : 0;

        // Nombres de las ingestas alineadas con las filas de porcentajes (Filas 16 a 20)
        const mealsInfo = [
            { name: "DESAYUNO", rowIndex: 15 },
            { name: "ALMUERZO", rowIndex: 16 },
            { name: "COMIDA", rowIndex: 17 },
            { name: "MERIENDA", rowIndex: 18 },
            { name: "CENA", rowIndex: 19 }
        ];

        const grid = document.getElementById('meal-grid');
        let html = "";

        mealsInfo.forEach(meal => {
            let pct = 0;
            // Leer porcentaje de la columna B (Índice 1)
            if (rows[meal.rowIndex] && rows[meal.rowIndex].c && rows[meal.rowIndex].c[1]) {
                pct = parseFloat(rows[meal.rowIndex].c[1].v) || 0;
            }

            // Cálculo dinámico por ingesta respetando el porcentaje
            let pBlocks = parseFloat((totalP * pct).toFixed(2));
            let hcBlocks = parseFloat((totalHC * pct).toFixed(2));
            let gBlocks = parseFloat((totalG * pct).toFixed(2));

            // Guardar en memoria global para el generador de platos
            bloquesAsignadosPorIngesta[meal.name] = { p: pBlocks, hc: hcBlocks, g: gBlocks };
            const icon = mealIcons[meal.name] || "fa-utensils";

            html += `
                <div class="meal-card">
                    <div class="meal-name"><i class="fa-solid ${icon}"></i> ${meal.name}</div>
                    <div class="meal-content">
                        Proteína: <b>${pBlocks}</b> blq<br>
                        Carbohidrato: <b>${hcBlocks}</b> blq<br>
                        Grasa: <b>${gBlocks}</b> blq
                    </div>
                </div>`;
        });
        grid.innerHTML = html;
    }

    function procesarYRenderizarEquivalencias(raw) {
        const json = cleanJSON(raw);
        const rows = json.table.rows;
        
        poolProteinas = []; poolCarbohidratos = []; poolGrasas = []; poolBuscadorCompleto = [];

        for (let i = 1; i < rows.length; i++) {
            const row = rows[i].c;
            if (!row || !row[1] || row[1].v === null) continue; 

            let nombreAlimento = String(row[1].v).trim();
            let macroPrincipal = row[2] && row[2].v ? String(row[2].v).toUpperCase().trim() : "";
            
            let gramosRaw = row[3] && row[3].v !== null ? String(row[3].v) : "0";
            let gramosVal = parseFloat(gramosRaw.replace(',', '.')) || 0;
            let unidadVal = row[4] && row[4].v ? String(row[4].v).trim() : "g";

            // Lectura exacta alineada a tus nuevas columnas limpias:
            let tagExclusionStr = row[5] && row[5].v ? String(row[5].v).toUpperCase() : ""; // Columna F
            let tagEstiloVidaStr = row[6] && row[6].v ? String(row[6].v).toUpperCase() : ""; // Columna G
            let tagMomentoStr = row[7] && row[7].v ? String(row[7].v).toUpperCase() : "";    // Columna H

            let todosLosTags = [
                ...tagExclusionStr.split(','),
                ...tagEstiloVidaStr.split(','),
                ...tagMomentoStr.split(',')
            ].map(t => t.trim()).filter(t => t !== "");

            let descartarAlimento = false;

            // 1. Filtro Alimentos Odiados
            let nombreMinuscula = nombreAlimento.toLowerCase();
            if (exclusionesPaciente.alimentosOdiados.some(odiado => nombreMinuscula.includes(odiado))) {
                descartarAlimento = true;
            }

            // 2. Filtro Alergias / Exclusiones
            if (exclusionesPaciente.tagsExcluir.length > 0) {
                if (todosLosTags.some(tag => exclusionesPaciente.tagsExcluir.includes(tag))) {
                    descartarAlimento = true;
                }
            }

            // 3. Filtro Estilo de Vida Estricto
            if (exclusionesPaciente.estiloVida === "VEGETARIANO" || exclusionesPaciente.estiloVida === "VEGANO") {
                if (todosLosTags.includes("ANIMAL") || todosLosTags.includes("CARNE") || todosLosTags.includes("PESCADO") || tagEstiloVidaStr.includes("OMNIVORO")) {
                    descartarAlimento = true;
                }
            }

            if (descartarAlimento) continue; 

            const itemObjeto = { nombre: nombreAlimento, gramos: gramosVal, unidad: unidadVal, tipo: "" };

            if (macroPrincipal === "P") {
                itemObjeto.tipo = "PROTEÍNAS";
                poolProteinas.push(itemObjeto);
            } else if (macroPrincipal === "HC") {
                itemObjeto.tipo = "CARBOHIDRATOS";
                poolCarbohidratos.push(itemObjeto);
            } else if (macroPrincipal === "G") {
                itemObjeto.tipo = "GRASAS";
                poolGrasas.push(itemObjeto);
            } else if (macroPrincipal === "MIXTO") {
                itemObjeto.tipo = "ALIMENTOS MIXTOS";
            }

            if (itemObjeto.tipo !== "") {
                poolBuscadorCompleto.push(itemObjeto);
            }
        }

        const tbody = document.getElementById('table-body');
        let htmlTable = "";
        poolBuscadorCompleto.forEach(item => {
            let bClass = "bg-p";
            if(item.tipo === "CARBOHIDRATOS") bClass = "bg-hc";
            else if(item.tipo === "GRASAS") bClass = "bg-g";
            else if(item.tipo === "ALIMENTOS MIXTOS") bClass = "bg-m";
            
            htmlTable += `<tr data-type="${item.tipo.toLowerCase()}">
                <td><strong>${item.nombre}</strong></td>
                <td>${item.gramos > 0 ? item.gramos + " " + item.unidad : 'Ver definición'}</td>
                <td><span class="badge ${bClass}">${item.tipo}</span></td>
            </tr>`;
        });
        tbody.innerHTML = htmlTable;
    }

    function generarPlatoInteligente() {
        const ingesta = document.getElementById('meal-selector').value;
        const blq = bloquesAsignadosPorIngesta[ingesta];
        const out = document.getElementById('plate-output');
        out.style.display = "block";

        if (!blq || (blq.p === 0 && blq.hc === 0 && blq.g === 0)) {
            out.innerHTML = `<div class="plate-title">No hay bloques definidos para esta ingesta.</div>`;
            return;
        }

        let html = `<div class="plate-title">Propuesta adaptada a tus bloques (${blq.p}P - ${blq.hc}HC - ${blq.g}G)</div>`;
        
        if(blq.p > 0 && poolProteinas.length > 0) {
            let p = poolProteinas[Math.floor(Math.random() * poolProteinas.length)];
            html += `<div class="plate-item"><span>🥩 <b>${(blq.p * p.gramos).toFixed(0)} ${p.unidad}</b> de <b>${p.nombre}</b></span><span class="item-macro-tag bg-p">P</span></div>`;
        }
        if(blq.hc > 0 && poolCarbohidratos.length > 0) {
            let h = poolCarbohidratos[Math.floor(Math.random() * poolCarbohidratos.length)];
            html += `<div class="plate-item"><span>🌾 <b>${(blq.hc * h.gramos).toFixed(0)} ${h.unidad}</b> de <b>${h.nombre}</b></span><span class="item-macro-tag bg-hc">HC</span></div>`;
        }
        if(blq.g > 0 && poolGrasas.length > 0) {
            let g = poolGrasas[Math.floor(Math.random() * poolGrasas.length)];
            html += `<div class="plate-item"><span>🥑 <b>${(blq.g * g.gramos).toFixed(0)} ${g.unidad}</b> de <b>${g.nombre}</b></span><span class="item-macro-tag bg-g">G</span></div>`;
        }
        out.innerHTML = html;
    }

    function setCategoryFilter(cat, btn) {
        currentCategoryFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        ejecutarFiltroCombinado();
    }

    function ejecutarFiltroCombinado() {
        const text = document.getElementById('search').value.toLowerCase();
        const trs = document.getElementById('table-body').getElementsByTagName('tr');
        for (let i = 0; i < trs.length; i++) {
            const tr = trs[i];
            const name = tr.getElementsByTagName('td')[0].textContent.toLowerCase();
            const type = tr.getAttribute('data-type') || "";
            tr.style.display = (name.includes(text) && (currentCategoryFilter === 'all' || type === currentCategoryFilter)) ? "" : "none";
        }
    }
</script>
